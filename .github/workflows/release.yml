run-name: Publish tag ${{ github.ref }}
on:
  push:
    tags:
      - "v*"
permissions:
  packages: write
  contents: write
env:
  JAVA_OPTS: "-Xmx4096M"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Remove the prefix from the version name
        run: |
          VERSION="${{ github.ref }}"
          VERSION=${VERSION#*v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build using Gradle
        run: ./gradlew assemble

      - name: Run tests (desktop)
        run: ./gradlew desktopTest

      - name: Run tests (wasmJs)
        run: ./gradlew wasmJsTest

      - name: Check for API changes
        run: ./gradlew apiCheck

      - name: Publish to GitHub Packages and Maven Central
        run: ./gradlew publish
        env:
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ github.token }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PWD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PWD }}

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          draft: true
          name: ${{ env.VERSION }}
